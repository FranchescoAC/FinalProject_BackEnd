name: CI/CD Pipeline for Dockers

on:
  workflow_call:
    secrets:
      docker_username:
        required: true
      docker_password:
        required: true
      repository_name:
        required: true

permissions:
  actions: read
  contents: read

  workflow_dispatch: # Esto permite que el workflow sea ejecutado manualmente o por otros workflows.

jobs:
  login-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.docker_username }}
          password: ${{ secrets.docker_password }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.docker_username }}/${{ secrets.repository_name }}:latest .
          docker push ${{ secrets.docker_username }}/${{ secrets.repository_name }}:latest
