name: CI/CD Pipeline for Docker

on:
  workflow_call:
    secrets:
      docker_username:
        required: true
      docker_password:
        required: true
      repository_name:
        required: true

jobs:
  login-and-push:
    runs-on: ubuntu-repository_name
    steps:
      # Clonar el código del repositorio
      - name: Checkout code
        uses: actions/checkout@v3

      # Iniciar sesión en Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.docker_username }}
          password: ${{ secrets.docker_password }}

      # Construir y enviar la imagen a Docker Hub
      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.docker_username }}/${{ secrets.repository_name }}:lastest .
          docker push ${{ secrets.docker_username }}/${{ secrets.repository_name }}:lastest