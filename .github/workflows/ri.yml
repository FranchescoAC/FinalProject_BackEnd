name: Registry image

on:
  push:
    branches: ["QA"]

permissions:
  contents: read
  packages: write  # Required for using Docker secrets (optional)

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [DeleteBus, RegisterBus]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub using Docker secrets (optional)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image for ${{ matrix.service }}
        run: |
          # Assuming your secrets are named DOCKER_USERNAME and DOCKER_PASSWORD
          echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
          docker build --build-arg BUILDKIT_INLINE_CACHE=1 -f ./BusManagement/${{ matrix.service }}/Dockerfile -t ${{ secrets.DOCKER_USERNAME }}/{{ secrets.DOCKER_REPOSITORY_NAME }}_{{ matrix.service }}:latest ./BusManagement/${{ matrix.service }}
          docker push ${{ secrets.DOCKER_USERNAME }}/{{ secrets.DOCKER_REPOSITORY_NAME }}_{{ matrix.service }}:latest