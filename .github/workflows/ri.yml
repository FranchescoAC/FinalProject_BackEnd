name: Registry image

on:
  push:
    branches: ["QA"]

jobs:
  login-and-pull-QA-Delete_Bus:
    if: github.ref == 'refs/heads/QA'
    uses: ./BusManagement/DeleteBus/.github/workflows/cd.yml@QA
    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_password: ${{ secrets.DOCKER_PASSWORD }}
      repository_name: ${{ secrets.DOCKER_REPOSITORY_NAME_BUS_DELETE }}

  login-and-pull-QA-Register-Bus:
    if: github.ref == 'refs/heads/QA'
    uses: ./NotificationManagement/RegisterBus/.github/workflows/cd.yml@QA
    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_password: ${{ secrets.DOCKER_PASSWORD }}
      repository_name: ${{ secrets.DOCKER_REPOSITORY_NAME_BUS_REGISTER }}

