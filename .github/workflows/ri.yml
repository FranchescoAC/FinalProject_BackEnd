name: Registry image

on:
  push:
    branches: ["QA"]

jobs:
  login-and-pull-QA-Bus-Delete:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout DeleteBus
        uses: actions/checkout@v3
        with:
          path: BusManagement/DeleteBus

      - name: Set up GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd BusManagement/DeleteBus
          gh workflow run .github/workflows/cd.yml


  login-and-pull-QA-Bus-Register:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout RegisterBus
        uses: actions/checkout@v3
        with:
          path: BusManagement/RegisterBus

      - name: Set up GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd BusManagement/RegisterBus
          gh workflow run .github/workflows/cd.yml

