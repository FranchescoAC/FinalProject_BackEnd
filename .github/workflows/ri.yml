name: Registry image

on:
  push:
    branches: ["QA"]

permissions:
  contents: read

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [BUS_DELETE, BUS_REGISTER]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build and push Docker image for ${{ matrix.service }}
        run: |
          echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

          # Obtener el nombre del repositorio (con manejo de errores)
          REPO_NAME="${{ secrets[format('DOCKER_REPOSITORY_NAME_{0}', matrix.service)] }}"
          echo "Nombre del repositorio: $REPO_NAME" # Imprime el nombre para depuración

          # Construcción de la ruta al Dockerfile y al contexto (SIMPLIFICADO)
          DOCKERFILE_PATH="./BusManagement/${{ matrix.service | replace('_', '/') }}/Dockerfile"
          CONTEXT_PATH="./BusManagement/${{ matrix.service | replace('_', '/') }}"

          # Verificar si el nombre del repositorio es válido (RECOMENDADO)
          if [[ ! "$REPO_NAME" =~ ^[a-z0-9._-]+$ ]]; then
            echo "Error: El nombre del repositorio '$REPO_NAME' contiene caracteres inválidos. Solo se permiten letras minúsculas, números, guiones bajos, guiones medios y puntos."
            exit 1
          fi

          docker buildx build --platform linux/amd64 --build-arg BUILDKIT_INLINE_CACHE=1 -f "$DOCKERFILE_PATH" -t ${{ secrets.DOCKER_USERNAME }}/$REPO_NAME:latest "$CONTEXT_PATH" --push