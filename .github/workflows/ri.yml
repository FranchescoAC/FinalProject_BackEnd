name: Trigger sub-workflows

on:
  push:
    branches: ["dev"]

permissions:
  contents: write # Otorga permisos para que el workflow pueda llamar a otros workflows

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  trigger-registerbus:
    name: Trigger RegisterBus workflow
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Trigger RegisterBus workflow
        run: |
          echo "Triggering RegisterBus workflow"
          gh workflow run cd.yml \
            -R ${{ github.repository }} \
            -f service=RegisterBus \
            -f branch=dev

  trigger-deletebus:
    name: Trigger DeleteBus workflow
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Trigger DeleteBus workflow
        run: |
          echo "Triggering DeleteBus workflow"
          gh workflow run cd.yml \
            -R ${{ github.repository }} \
            -f service=DeleteBus \
            -f branch=dev
