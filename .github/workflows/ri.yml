name: Main Workflow
on:
  push:
    branches: [dev]

jobs: # UN SOLO BLOQUE jobs:
  register_bus: # Job para registrar un bus
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Register Bus
        uses: ./.github/workflows/bus-management/register-bus.yml

  delete_bus: # Job para borrar un bus (independiente)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Delete Bus
        uses: ./.github/workflows/bus-management/delete-bus.yml

  update_bus: # Job para actualizar un bus (independiente)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Update Bus Availability
        uses: ./.github/workflows/bus-management/update-bus-availability.yml