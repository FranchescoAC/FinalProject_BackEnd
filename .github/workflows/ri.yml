name: Trigger sub-workflows

on:
  push:
    branches: ["dev"]

permissions:
  contents: write

jobs:
  trigger-registerbus:
    name: Trigger RegisterBus workflow
    runs-on: ubuntu-latest
    steps:
      - name: Trigger RegisterBus workflow
        run: |
          echo "Triggering RegisterBus workflow"
          gh workflow run cd.yml -R ${{ github.repository }} -f service=RegisterBus

  trigger-deletebus:
    name: Trigger DeleteBus workflow
    runs-on: ubuntu-latest
    steps:
      - name: Trigger DeleteBus workflow
        run: |
          echo "Triggering DeleteBus workflow"
          gh workflow run cd.yml -R ${{ github.repository }} -f service=DeleteBus
