name: Registry image

on:
  push:
    branches: ["QA"]

permissions:
  contents: read

jobs:
  trigger-registerbus-cd:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Trigger RegisterBus CD pipeline
        uses: peter-evans/workflow-dispatch@v1
        with:
          repository: ${{ github.repository }}
          workflow: .github/workflows/cd.yml
          ref: refs/heads/QA
          inputs: # Si es necesario, puedes definir inputs aquí

  trigger-deletebus-cd:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Trigger DeleteBus CD pipeline
        uses: peter-evans/workflow-dispatch@v1
        with:
          repository: ${{ github.repository }}
          workflow: .github/workflows/cd.yml
          ref: refs/heads/QA
          inputs: # Si es necesario, puedes definir inputs aquí
