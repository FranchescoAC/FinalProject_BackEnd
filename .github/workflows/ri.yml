name: Registry image

on:
  push:
    branches: ["QA"]

jobs:
  login-and-pull-QA-delete:
    if: github.ref == 'refs/heads/QA'
    name: My first step - check out repository
    uses: actions/checkout@v4
    name: My first step - check out repository
    uses: ./BusManagement/DeleteBus/.github/workflows
    secrets:
      docker_password: ${{ secrets.DOCKER_PASSWORD }}
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      repository_name: ${{ secrets.DOCKER_REPOSITORY_NAME_BUS_DELETE }}

  login-and-pull-QA-register:
    if: github.ref == 'refs/heads/QA'
    uses: ./BusManagement/DeleteBus/.github/workflows
    secrets:
      docker_password: ${{ secrets.DOCKER_PASSWORD }}
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      repository_name: ${{ secrets.DOCKER_REPOSITORY_NAME_BUS_REGISTER }}
