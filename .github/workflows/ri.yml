name: Main Workflow
on:
  push:
    branches: [dev]

jobs: # UN SOLO BLOQUE jobs:
  register_bus: # Job para registrar un bus
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Register Bus
        uses: ./workflows/bus-management/Register-Bus.yml

  delete_bus: # Job para borrar un bus (independiente)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Delete Bus
        uses: ./workflows/bus-management/Delete-Bus.yml

  update_bus: # Job para actualizar un bus (independiente)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Update Bus Availability
        uses: ./workflows/bus-management/Update-Bus.yml