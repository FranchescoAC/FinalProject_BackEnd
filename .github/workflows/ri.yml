name: Registry image

on:
  push:
    branches: ["QA"]

permissions:
  contents: read

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [DeleteBus, RegisterBus]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build and push Docker image for ${{ matrix.service }}
        run: |
          echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
          docker buildx build --platform linux/amd64 --build-arg BUILDKIT_INLINE_CACHE=1 -f ./BusManagement/${{ matrix.service }}/Dockerfile -t ${{ secrets.DOCKER_USERNAME }}/${{ secrets[format('DOCKER_REPOSITORY_NAME_{0}', matrix.service)] }}:latest ./BusManagement/${{ matrix.service }} --push # Se agrega --push para subir la imagen directamente