name: Registry image

on:
  push:
    branches: ["QA"]

permissions:
  contents: read

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [DeleteBus, RegisterBus]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build and push Docker image for ${{ matrix.service }}
        uses: ./.github/workflows/cd.yml
        with:
          docker_username: ${{ secrets.DOCKER_USERNAME }}
          docker_password: ${{ secrets.DOCKER_PASSWORD }}
          repository_name: ${{ secrets[format('DOCKER_REPOSITORY_NAME_{0}', matrix.service)] }}
          dockerfile_path: ./BusManagement/${{ matrix.service }}/Dockerfile