name: Registry image

on:
  push:
    branches: ["QA"]

permissions:
  contents: read

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [BUS_DELETE, BUS_REGISTER]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build and push Docker image for ${{ matrix.service }}
        run: |
          echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
          REPO_NAME="${{ secrets[format('DOCKER_REPOSITORY_NAME_{0}', matrix.service)] }}"
          SERVICE_PATH="${{ matrix.service }}" #Store the service name to use in the replace function
          SERVICE_PATH="${{ replace(SERVICE_PATH, '_', '/') }}" #Replace the _ with /
          docker buildx build --platform linux/amd64 --build-arg BUILDKIT_INLINE_CACHE=1 -f ./BusManagement/${{ SERVICE_PATH }}/Dockerfile -t ${{ secrets.DOCKER_USERNAME }}/$REPO_NAME:latest ./BusManagement/${{ SERVICE_PATH }} --push