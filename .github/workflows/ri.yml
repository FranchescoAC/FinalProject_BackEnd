name: Registry image dispatcher

on:
  push:
    branches: ["dev"]

permissions:
  contents: write

jobs:
  trigger-registerbus:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Trigger RegisterBus workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Triggering RegisterBus workflow"
          gh workflow run cd.yml \
            -R ${{ github.repository }} \
            -f branch=dev \
            -f service=RegisterBus

  trigger-deletebus:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Trigger DeleteBus workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Triggering DeleteBus workflow"
          gh workflow run cd.yml \
            -R ${{ github.repository }} \
            -f branch=dev \
            -f service=DeleteBus
