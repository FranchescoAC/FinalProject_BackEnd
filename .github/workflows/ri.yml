name: Registry image dispatcher

on:
  push:
    branches: ["dev"]

permissions:
  contents: write

jobs:
  trigger-registerbus:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger RegisterBus workflow
        uses: actions/github-script@v6
        with:
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: "registerbus",
            });

  trigger-deletebus:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger DeleteBus workflow
        uses: actions/github-script@v6
        with:
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: "deletebus",
            });
            
  trigger-deleteticket:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger DeleteBus workflow
        uses: actions/github-script@v6
        with:
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: "deteticket",
            });

