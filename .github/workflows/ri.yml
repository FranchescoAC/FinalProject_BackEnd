name: Registry image

on:
  push:
    branches: ["QA"]

permissions:
  contents: read

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [DeleteBus, RegisterBus]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build and push Docker image for ${{ matrix.service }}
        run: |
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }} # Login directo aquí
          docker build --build-arg BUILDKIT_INLINE_CACHE=1 -f ./BusManagement/${{ matrix.service }}/Dockerfile -t ${{ secrets.DOCKER_USERNAME }}/${{ secrets[format('DOCKER_REPOSITORY_NAME_{0}', matrix.service)] }}:latest ./BusManagement/${{ matrix.service }}
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ secrets[format('DOCKER_REPOSITORY_NAME_{0}', matrix.service)] }}:latest