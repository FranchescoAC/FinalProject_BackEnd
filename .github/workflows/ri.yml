name: Registry image

on:
  push:
    branches: ["QA"]

permissions:
  contents: read

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [BUS_DELETE, BUS_REGISTER] # Se ajusta el nombre de los servicios para que coincida con los secretos

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build and push Docker image for ${{ matrix.service }}
        run: |
          echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
          REPO_NAME="${{ secrets[format('DOCKER_REPOSITORY_NAME_{0}', matrix.service)] }}" # Se obtiene el nombre del repo directamente del secreto
          docker buildx build --platform linux/amd64 --build-arg BUILDKIT_INLINE_CACHE=1 -f ./BusManagement/${{ matrix.service | replace('_', '/') }}/Dockerfile -t ${{ secrets.DOCKER_USERNAME }}/$REPO_NAME:latest ./BusManagement/${{ matrix.service | replace('_', '/') }} --push # Se utiliza replace para cambiar _ por /