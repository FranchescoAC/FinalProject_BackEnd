name: Registry image

on:
  push:
    branches: ["QA"]

jobs:
  login-and-pull-QA-delete:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout DeleteBus
        uses: actions/checkout@v3
        with:
          path: BusManagement/DeleteBus

      - name: Run DeleteBus Pipeline
        run: |
          cd BusManagement/DeleteBus
          gh workflow run .github/workflows/cd.yml

  login-and-pull-QA-register:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout RegisterBus
        uses: actions/checkout@v3
        with:
          path: BusManagement/RegisterBus

      - name: Run RegisterBus Pipeline
        run: |
          cd BusManagement/RegisterBus
          gh workflow run .github/workflows/cd.yml
