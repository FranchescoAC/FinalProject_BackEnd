name: Registry image

on:
  push:
    branches: ["QA"]

permissions:
  actions: read
  contents: read

jobs:
  login-and-pull-QA-delete:
    name: Delete Bus Image
    uses: ./.github/workflows/cd.yml
    with:
      docker_username: ${{ secrets.DOCKERUSERNAME }}
      docker_password: ${{ secrets.DOCKER_PASSWORD }}
      repository_name: ${{ secrets.DOCKER_REPOSITORY_NAME_BUS_DELETE }}
      dockerfile_path: ./BusManagement/DeleteBus/Dockerfile # Ruta al Dockerfile

  login-and-pull-QA-register:
    name: Register Bus Image
    uses: ./.github/workflows/cd.yml
    with:
      docker_username: ${{ secrets.DOCKERUSERNAME }}
      docker_password: ${{ secrets.DOCKER_PASSWORD }}
      repository_name: ${{ secrets.DOCKER_REPOSITORY_NAME_BUS_REGISTER }}
      dockerfile_path: ./BusManagement/RegisterBus/Dockerfile # Ruta al Dockerfile