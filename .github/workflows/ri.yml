name: Registry image

on:
  push:
    branches: ["QA"]

permissions:
  actions: read
  contents: read

jobs:
  login-and-pull-QA-delete:
    name: Delete Bus Image
    uses: ../BusManagement/DeleteBus/.github/workflows/cd.yml@QA
    with:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_password: ${{ secrets.DOCKER_PASSWORD }}
      repository_name: ${{ secrets.DOCKER_REPOSITORY_NAME_BUS_DELETE }}

  login-and-pull-QA-register:
    name: Register Bus Image
    uses: ../BusManagement/RegisterBus/.github/workflows/cd.yml@QA
    with:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_password: ${{ secrets.DOCKER_PASSWORD }}
      repository_name: ${{ secrets.DOCKER_REPOSITORY_NAME_BUS_REGISTER }}