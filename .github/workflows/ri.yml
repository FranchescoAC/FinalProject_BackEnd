name: Main Workflow
on:
  push:
    branches: [dev] # o cualquier otro evento que desees
jobs:
  manage_buses:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Delete Bus
        uses: ./.github/workflows/BusManagement/DeleteBus/.github/workflows/cd.yml # Ruta relativa

      - name: Register Bus
        uses: ./.github/workflows/BusManagement/RegisterBus/.github/workflows/cd.yml # Ruta relativa

      - name: Update Bus Availability
        uses: ./.github/workflows/BusManagement/UpdateBusAvailability/.github/workflows/cd.yml # Ruta relativa