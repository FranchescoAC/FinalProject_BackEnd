name: Trigger sub-workflows

on:
  push:
    branches: ["dev"]

permissions:
  contents: write
  workflows: write

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  trigger-registerbus:
    name: Trigger RegisterBus workflow
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Trigger RegisterBus workflow
        run: |
          echo "Triggering RegisterBus workflow"
          gh workflow run BusManagement/RegisterBus/.github/workflows/cd.yml \
            -R ${{ github.repository }} \
            -f service=RegisterBus

  trigger-deletebus:
    name: Trigger DeleteBus workflow
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Trigger DeleteBus workflow
        run: |
          echo "Triggering DeleteBus workflow"
          gh workflow run BusManagement/DeleteBus/.github/workflows/cd.yml \
            -R ${{ github.repository }} \
            -f service=DeleteBus
