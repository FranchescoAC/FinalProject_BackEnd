name: Registry Docker Files

on:
  push:
    branches: ["dev"]

permissions:
  contents: read

jobs:



  User-Delete:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build and push Docker image for DeleteUser
        run: |
          echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
          REPO_NAME="${{ secrets.DOCKER_REPOSITORY_NAME_USER_DELETE }}"
          echo "Repo name: $REPO_NAME"
          if [[ ! "$REPO_NAME" =~ ^[a-zA-Z0-9._-]+$ ]]; then
            echo "ERROR: Invalid repository name."
            exit 1
          fi
          DOCKERFILE_PATH="./UserManagement/DeleteUser/Dockerfile"
          CONTEXT_PATH="./UserManagement/DeleteUser"
          docker buildx build --platform linux/amd64 --build-arg BUILDKIT_INLINE_CACHE=1 -f "$DOCKERFILE_PATH" -t ${{ secrets.DOCKER_USERNAME }}/$REPO_NAME:latest "$CONTEXT_PATH" --push
  
