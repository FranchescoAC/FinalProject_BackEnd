name: EC2 deploy from docker

on:
  push:
    branches: ["dev"]

jobs:
  Deploy-Docker-Compose-Bus-Management:
    uses: ./.github/workflows/login_pull_BusManagement.yml
    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_password: ${{ secrets.DOCKER_PASSWORD }}
      repository_name_registerbus: ${{ secrets.DOCKER_REPOSITORY_NAME_REGISTERBUS }}
      repository_name_deletebus: ${{ secrets.DOCKER_REPOSITORY_NAME_DELETEBUS }}
      repository_name_update_bus: ${{ secrets.DOCKER_REPOSITORY_NAME_BUS_UPDATE }}
      repository_name_view_bus: ${{ secrets.DOCKER_REPOSITORY_NAME_BUS_VIEW }}

  ssh-connect-ec2-Bus-Management:
      needs: Deploy-Docker-Compose-Bus-Management
      uses: ./.github/workflows/startEC2.yml
      secrets:
        ec2_host: ${{ secrets.EC2_HOST_BUS_MANAGEMENT }}
        ec2_key: ${{ secrets.EC2_KEY_BUS_MANAGEMENT }}
        domain: ${{ secrets.DOMAIN_BUS }}

  Deploy-Docker-Compose-User-Management:
    uses: ./.github/workflows/login_pull_UserManagement.yml
    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_password: ${{ secrets.DOCKER_PASSWORD }}
      repository_name_login_user: ${{ secrets.DOCKER_REPOSITORY_NAME_USER_LOGIN }}
      repository_name_delete_user: ${{ secrets.DOCKER_REPOSITORY_NAME_USER_DELETE }}
      repository_name_list_user: ${{ secrets.DOCKER_REPOSITORY_NAME_USER_LIST }}
      repository_name_register_user: ${{ secrets.DOCKER_REPOSITORY_NAME_USER_REGISTER }}
      repository_name_update_user: ${{ secrets.DOCKER_REPOSITORY_NAME_USER_UPDATE }}
      repository_name_view_user: ${{ secrets.DOCKER_REPOSITORY_NAME_USER_VIEW }}


  ssh-connect-ec2-User-Management:
      needs: Deploy-Docker-Compose-User-Management
      uses: ./.github/workflows/startEC2.yml
      secrets:
        ec2_host: ${{ secrets.EC2_HOST_USER_MANAGEMENT }}
        ec2_key: ${{ secrets.EC2_KEY_USER_MANAGEMENT }}
        domain: ${{ secrets.DOMAIN_USER }}

  Deploy-Docker-Compose-Route-Management:
    uses: ./.github/workflows/login_pull_RouteManagement.yml
    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_password: ${{ secrets.DOCKER_PASSWORD }}
      repository_name_delete_route: ${{ secrets.DOCKER_REPOSITORY_NAME_ROUTE_DELETE }}
      repository_name_list_route: ${{ secrets.DOCKER_REPOSITORY_NAME_ROUTE_LIST }}
      repository_name_register_route: ${{ secrets.DOCKER_REPOSITORY_NAME_ROUTE_REGISTER }}
      repository_name_update_route: ${{ secrets.DOCKER_REPOSITORY_NAME_ROUTE_UPDATE }}

  ssh-connect-ec2-Route-Management:
      needs: Deploy-Docker-Compose-Route-Management
      uses: ./.github/workflows/startEC2.yml
      secrets:
        ec2_host: ${{ secrets.EC2_HOST_ROUTE_MANAGEMENT }}
        ec2_key: ${{ secrets.EC2_KEY_ROUTE_MANAGEMENT }}
        domain: ${{ secrets.DOMAIN_ROUTE }}



