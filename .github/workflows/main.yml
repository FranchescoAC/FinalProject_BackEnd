name: Main Workflow
on:
  push:
    branches: [dev]

jobs:
  register_bus:
    uses: ./.github/workflows/Register-Bus.yml
    with:
      docker-repo-name: ${{ secrets.DOCKER_REPOSITORY_NAME_REGISTERBUS }}

  delete_bus:
    uses: ./.github/workflows/Delete-Bus.yml
    with:
      docker-repo-name: ${{ secrets.DOCKER_REPOSITORY_NAME_DELETEBUS }}

  update_bus:
    uses: ./.github/workflows/Update-Bus.yml
    with:
      docker-repo-name: ${{ secrets.DOCKER_REPOSITORY_NAME_UPDATEBUS }}
