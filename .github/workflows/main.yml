name: EC2 deploy from docker

on:
  push:
    branches: ["dev"]

jobs:
  Register-Bus:
    uses: ./.github/workflows/login_pull.yml
    secrets:
      docker_password: ${{ secrets.DOCKER_PASSWORD }}
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      repository_name: ${{ secrets.DOCKER_REPOSITORY_NAME_REGISTERBUS }}
      dockerfile_path: $"./BusManagement/RegisterBus"

  Delete-Bus:
    uses: ./.github/workflows/login_pull.yml
    secrets:
      docker_password: ${{ secrets.DOCKER_PASSWORD }}
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      repository_name: ${{ secrets.DOCKER_REPOSITORY_NAME_DELETEBUS }}
      dockerfile_path: $"./BusManagement/DeleteBus"