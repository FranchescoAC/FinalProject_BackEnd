name: EC2 deploy from docker

on:
  push:
    branches: ["dev"]

jobs:
  Deploy-Docker-Compose-Bus-Management:
    uses: ./.github/workflows/login_pull_BusManagement.yml
    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_password: ${{ secrets.DOCKER_PASSWORD }}
      repository_name_registerbus: ${{ secrets.DOCKER_REPOSITORY_NAME_REGISTERBUS }}
      repository_name_deletebus: ${{ secrets.DOCKER_REPOSITORY_NAME_DELETEBUS }}
      repository_name_update_bus: ${{ secrets.DOCKER_REPOSITORY_NAME_BUS_UPDATE }}
      repository_name_view_bus: ${{ secrets.DOCKER_REPOSITORY_NAME_BUS_VIEW }}

  ssh-connect-ec2-Bus-Management:
      needs: Deploy-Docker-Compose-Bus-Management
      uses: ./.github/workflows/startEC2.yml
      secrets:
        ec2_host: ${{ secrets.EC2_HOST_BUS_MANAGEMENT }}
        ec2_key: ${{ secrets.EC2_KEY_BUS_MANAGEMENT }}
        domain: ${{ secrets.DOMAIN_BUS }}

  Deploy-Docker-Compose-Ticket-Management:
    uses: ./.github/workflows/login_pull_TicketManagement.yml
    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_password: ${{ secrets.DOCKER_PASSWORD }}
      repository_name_delete_ticket: ${{ secrets.DOCKER_REPOSITORY_NAME_TICKET_DELETE }}
      repository_name_register_ticket: ${{ secrets.DOCKER_REPOSITORY_NAME_TICKET_REGISTER }}
      repository_name_update_ticket: ${{ secrets.DOCKER_REPOSITORY_NAME_TICKET_UPDATE }}
      repository_name_view_ticket: ${{ secrets.DOCKER_REPOSITORY_NAME_TICKET_VIEW }}
      repository_name_availability_ticket: ${{ secrets.DOCKER_REPOSITORY_NAME_TICKET_AVAILABILITY }}

  ssh-connect-ec2-Ticket-Management:
      needs: Deploy-Docker-Compose-Ticket-Management
      uses: ./.github/workflows/startEC2.yml
      secrets:
        ec2_host: ${{ secrets.EC2_HOST_TICKET_MANAGEMENT }}
        ec2_key: ${{ secrets.EC2_KEY_TICKET_MANAGEMENT }}
        domain: ${{ secrets.DOMAIN_TICKET }}





