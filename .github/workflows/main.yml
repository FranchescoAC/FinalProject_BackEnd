name: Main Workflow
on:
  push:
    branches: [dev]

jobs:
  register_bus:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Register Bus
        uses: ./Register-Bus.yml
        with:
          docker-repo-name: ${{ secrets.DOCKER_REPOSITORY_NAME_REGISTERBUS }}

  delete_bus:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Delete Bus
        uses: ./Delete-Bus.yml
        with:
          docker-repo-name: ${{ secrets.DOCKER_REPOSITORY_NAME_DELETEBUS }}

  update_bus:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Update Bus Availability
        uses: ./Update-Bus.yml
        with:
          docker-repo-name: ${{ secrets.DOCKER_REPOSITORY_NAME_UPDATEBUS }}
