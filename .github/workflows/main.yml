name: Main Workflow
on:
  push:
    branches: [dev]

jobs:
  register_bus:
    uses: ./.github/workflows/Register-Bus.yml
    secrets:
      docker_repo_name: ${{ secrets.DOCKER_REPOSITORY_NAME_REGISTERBUS}}
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_password: ${{ secrets.DOCKER_PASSWORD }}

  delete_bus:
    uses: ./.github/workflows/Delete-Bus.yml
    secrets:
      docker-repo-name: ${{ secrets.DOCKER_REPOSITORY_NAME_DELETEBUS }}
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker-password: ${{ secrets.DOCKER_PASSWORD }}

  update_bus:
    uses: ./.github/workflows/Update-Bus.yml
    secrets:
      docker-repo-name: ${{ secrets.DOCKER_REPOSITORY_NAME_BUS_UPDATE }}
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker-password: ${{ secrets.DOCKER_PASSWORD }}
