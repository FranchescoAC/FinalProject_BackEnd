name: Registry image

on:
  push:
    branches: ["dev"]

jobs:
  login-push-bus-update:
    uses: ./.github/workflows/login_pull.yml
    secrets:
      docker_password: ${{ secrets.DOCKER_PASSWORD }}
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      repository_name: ${{ secrets.DOCKER_REPOSITORY_NAME_BUS_UPDATE }}

  ec2-cd-busmanagementdomain:
    needs: login-push-bus-update
    if: always()
    uses: ./.github/workflows/startEC2.yml
    secrets:
      ec2_host: ${{ secrets.EC2_HOST_BUS_MANAGEMENT }}
      ec2_key: ${{ secrets.EC2_KEY_BUS_MANAGEMENT }}
      docker_username: ${{ secrets.DOCKER_USERNAME }}