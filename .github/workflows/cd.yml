name: CI/CD Pipeline for Docker

on:
  workflow_call:
    inputs:
      docker_username:
        required: true
      docker_password:
        required: true
      repository_name:
        required: true
      dockerfile_path:
        required: true

jobs:
  login-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code # Este paso es CRUCIAL
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ inputs.docker_username }}
          password: ${{ inputs.docker_password }}

      - name: Build and Push Docker Image
        run: |
          docker build -f ${{ inputs.dockerfile_path }} -t ${{ inputs.docker_username }}/${{ inputs.repository_name }}:latest .
          docker push ${{ inputs.docker_username }}/${{ inputs.repository_name }}:latest