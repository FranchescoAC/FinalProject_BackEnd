name: CI/CD Pipeline for Docker

on:
  workflow_call:
    inputs:
      docker_username:
        required: true
      docker_password:
        required: true
      repository_name:
        required: true
      dockerfile_path:
        required: true
      context_path: # Nuevo input para el contexto
        required: true

jobs:
  login-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ inputs.docker_username }}
          password: ${{ inputs.docker_password }}

      - name: Build and Push Docker Image
        run: |
          cd $GITHUB_WORKSPACE
          docker build --build-arg BUILDKIT_INLINE_CACHE=1 -f ${{ inputs.dockerfile_path }} -t ${{ inputs.docker_username }}/${{ inputs.repository_name }}:latest ${{ inputs.context_path }} # Cambio crucial: se usa inputs.context_path
          docker push ${{ inputs.docker_username }}/${{ inputs.repository_name }}:latest