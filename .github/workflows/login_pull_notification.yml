name: Login to Docker Hub and push new image version

on:
  workflow_call:
    secrets:
      docker_username:
        required: true
      docker_password:
        required: true
      repository_name_notification_create:
        required: true
      repository_name_notification_delete:
        required: true
      repository_name_notification_view:
        required: true

jobs:
  login_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose

      - name: Log in to Docker Hub
        run: |
          echo "${{ secrets.docker_password }}" | docker login -u "${{ secrets.docker_username }}" --password-stdin

      - name: Build and push images with Docker Compose
        run: |
          export DOCKER_USERNAME="${{ secrets.docker_username }}"

          export DOCKER_REPOSITORY_NAME_NOTIFICATION_CREATE="${{ secrets.repository_name_notification_create }}"
          export DOCKER_REPOSITORY_NAME_NOTIFICATION_DELETE="${{ secrets.repository_name_notification_delete }}"
          export DOCKER_REPOSITORY_NAME_NOTIFICATION_VIEW="${{ secrets.repository_name_notification_view }}"

          docker-compose -f ./NotificationManagement/docker-compose.yml build
          docker-compose -f ./NotificationManagement/docker-compose.yml push