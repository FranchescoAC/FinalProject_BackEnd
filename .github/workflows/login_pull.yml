name: Login to Docker Hub and push new image version

on:
  workflow_call:
jobs:
  login_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose

      - name: Log in to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push images with Docker Compose
        run: |
          export DOCKER_USERNAME="${{ secrets.DOCKER_USERNAME }}"
          export DOCKER_REPOSITORY="${{ secrets.DOCKER_REPOSITORY_NAME_REGISTERBUS }}"
          export DOCKER_REPOSITORY="${{ secrets.DOCKER_REPOSITORY_NAME_DELETEBUS }}"
          export DOCKER_REPOSITORY="${{ secrets.DOCKER_REPOSITORY_NAME_BUS_UPDATE }}"
          export DOCKER_REPOSITORY_NAME_BUS_VIEW="${{ secrets.DOCKER_REPOSITORY_NAME_BUS_VIEW }}"

          export DOCKER_REPOSITORY="${{ secrets.DOCKER_REPOSITORY_NAME_NOTIFICATION_CREATE }}"
          export DOCKER_REPOSITORY="${{ secrets.DOCKER_REPOSITORY_NAME_NOTIFICATION_DELETE }}"
          export DOCKER_REPOSITORY="${{ secrets.DOCKER_REPOSITORY_NAME_NOTIFICATION_VIEW }}"


          docker-compose -f ./BusManagement/docker-compose.yml build
          docker-compose -f ./BusManagement/docker-compose.yml push