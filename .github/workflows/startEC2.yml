name: Start EC2 and Deploy

on:
  workflow_call:
    secrets:
      ec2_host:
        required: true
      ec2_key:
        required: true
      domain:
        required: true
      repository_name_registerbus:
        required: true
      repository_name_deletebus:
        required: true
      repository_name_update_bus:
        required: true
      repository_name_view_bus:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          echo "${{ secrets.ec2_key }}" > private_key.pem
          chmod 600 private_key.pem
      - name: SSH into EC2 and Deploy Application
        run: |
          ssh -T -o StrictHostKeyChecking=no -i private_key.pem ubuntu@${{ secrets.ec2_host }} << EOF
            # Ir al directorio home del usuario ubuntu
            cd /home/ubuntu

            # Copiar el directorio BusManagement usando rsync
            sudo rsync -avz /home/runner/work/FinalProject_BackEnd/BusManagement/ /home/ubuntu/BusManagement/

            # Ir al directorio BusManagement
            cd BusManagement/

            # Carga las variables de entorno desde .env
            source ./.env

            sudo docker-compose -f ./docker-compose.yml pull  # Ruta corregida
            sudo docker-compose -f ./docker-compose.yml down  # Ruta corregida
            sudo docker-compose -f ./docker-compose.yml up -d --build  # Ruta corregida
          EOF