name: Docker Setup & Update Application (Reusable Workflow)

on:
  workflow_call:
    secrets:
      docker_username:
        required: true
      ec2_host:
        required: true
      ec2_key:
        required: true

jobs:
  connect_update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create private key file
        run: |
          echo "${{ secrets.ec2_key }}" > private_key.pem
          chmod 400 private_key.pem

      - name: Copy files to EC2 using rsync
        run: |
          rsync -avz -e "ssh -o StrictHostKeyChecking=no -i private_key.pem" BusManagement/ ubuntu@${{ secrets.ec2_host }}:/home/ubuntu/

      - name: SSH into EC2 and Deploy Application
        run: |
          ssh -tt -o StrictHostKeyChecking=no -i private_key.pem ubuntu@${{ secrets.ec2_host }} << 'EOF'
            set -e  # Detiene el script si hay un error

            # Instalar Docker y Docker Compose si no están instalados
            if ! command -v docker &> /dev/null; then
              echo "Docker no encontrado. Instalando..."
              sudo apt update
              sudo apt install -y docker.io docker-compose-plugin
              sudo systemctl enable docker
              sudo usermod -aG docker ubuntu
              newgrp docker
            fi

            if ! command -v docker compose &> /dev/null; then
              echo "Docker Compose no encontrado. Instalando..."
              sudo apt update
              sudo apt install -y docker-compose-plugin
            fi

            # Navegar al directorio del proyecto
            cd /home/ubuntu/BusManagement || { echo "Error: No se encuentra el directorio"; exit 1; }

            # Verificar si el archivo docker-compose.yml existe
            if [ ! -f docker-compose.yml ]; then
              echo "Error: No se encontró el archivo docker-compose.yml"
              exit 1
            fi

            # Pull de imágenes, detener contenedores antiguos y levantar nuevos
            sudo docker compose pull
            sudo docker compose down || true
            sudo docker compose up -d --build

          EOF

      - name: Cleanup private key file
        if: always()
        run: rm -f private_key.pem
