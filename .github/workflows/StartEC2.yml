name: Docker Setup & Update Application (Reusable Workflow)

on:
  workflow_call:
    secrets:
      docker_username:
        required: true
      ec2_host:
        required: true
      ec2_key:
        required: true

jobs:
  connect_update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create private key file
        run: |
          echo "${{ secrets.ec2_key }}" > private_key.pem
          chmod 600 private_key.pem  # Permisos seguros

      - name: Copy files to EC2 using rsync
        run: |
          rsync -avz -e "ssh -o StrictHostKeyChecking=no -i private_key.pem" BusManagement/ ubuntu@${{ secrets.ec2_host }}:/home/ubuntu/BusManagement/

      - name: SSH into EC2 and Deploy Application
        run: |
          ssh -t -t -o StrictHostKeyChecking=no -i private_key.pem ubuntu@${{ secrets.ec2_host }} << 'EOF'
            set -e  # Detener en caso de errores

            echo ">>> Verificando instalación de Docker y Docker Compose..."

            # Verificar e instalar Docker si no está presente
            if ! command -v docker &> /dev/null; then
              echo ">>> Instalando Docker..."
              sudo apt update
              sudo apt install -y docker.io
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker ubuntu
            fi

            # Verificar e instalar Docker Compose si no está presente
            if ! command -v docker compose &> /dev/null; then
              echo ">>> Instalando Docker Compose..."
              sudo apt update
              sudo apt install -y docker-compose-plugin
            fi

            echo ">>> Verificando contenido en /home/ubuntu/BusManagement..."
            ls -l /home/ubuntu/BusManagement

            # Navegar al directorio del proyecto
            cd /home/ubuntu/BusManagement || { echo "Error: Directorio no encontrado"; exit 1; }

            # Verificar que docker-compose.yml existe
            if [ ! -f "docker-compose.yml" ]; then
              echo "Error: No se encontró docker-compose.yml"
              exit 1
            fi

            echo ">>> Iniciando despliegue con Docker Compose..."

            # Actualizar imágenes y reiniciar contenedores
            sudo docker compose pull
            sudo docker compose down || true
            sudo docker compose up -d --build

            echo ">>> Despliegue exitoso."
          EOF

      - name: Cleanup private key file
        if: always()
        run: rm -f private_key.pem
