name: Docker Setup & Update Application (Reusable Workflow)

on:
  workflow_call:
    secrets:
      docker_username:
        required: true
      ec2_host:
        required: true
      ec2_key:
        required: true

jobs:
  connect_update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create private key file
        run: |
          echo "${{ secrets.ec2_key }}" > private_key.pem
          chmod 400 private_key.pem  # More secure permissions

      - name: Copy files to EC2 using rsync
        run: |
          rsync -avz -e "ssh -o StrictHostKeyChecking=no -i private_key.pem" ./ ubuntu@${{ secrets.ec2_host }}:/home/ubuntu/BusManagement/

      - name: SSH into EC2 and Deploy Application
        run: |
          ssh -o StrictHostKeyChecking=no -i private_key.pem ubuntu@${{ secrets.ec2_host }} << EOF
            # Install Docker (improved)
            if ! command -v docker &> /dev/null; then
              sudo apt update
              sudo apt install -y docker.io docker-compose-plugin  # Use docker-compose-plugin
              sudo systemctl enable docker
              sudo usermod -aG docker ubuntu
              newgrp docker # Apply group changes without a new login
            fi

            # Navigate to project directory
            cd /home/ubuntu/BusManagement

            # Pull images, stop old containers, and start new ones (combined)
            sudo docker compose pull  # Use docker compose instead of docker-compose
            sudo docker compose down || true # Use docker compose instead of docker-compose
            sudo docker compose up -d --build  # Use docker compose instead of docker-compose
          EOF

      - name: Cleanup private key file
        if: always() # Run even if previous steps fail
        run: rm -f private_key.pem