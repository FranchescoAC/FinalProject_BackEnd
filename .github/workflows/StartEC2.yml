name: Docker Setup & Update Application (Reusable Workflow)

on:
  workflow_call:
    secrets:
      docker_username:
        required: true
      ec2_host:
        required: true
      ec2_key:
        required: true

jobs:
  connect_update:
    runs-on: ubuntu-latest
    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Create private key file
      run: |
        echo "${{ secrets.ec2_key }}" > private_key.pem
        chmod 600 private_key.pem

    - name: Copy files to EC2 using SCP
      working-directory: BusManagement/
      run: |
        scp -o StrictHostKeyChecking=no -i private_key.pem -r * ubuntu@${{ secrets.ec2_host }}:/home/ubuntu/BusManagement/

    - name: SSH into EC2 and Deploy Application
      uses: appleboy/ssh-action@v1.2.0
      with:
        host: ${{ secrets.ec2_host }}
        username: ubuntu
        key: ${{ secrets.ec2_key }}
        script: |
          # Verificar e instalar Docker y Docker Compose
          if ! command -v docker &> /dev/null; then
            sudo apt update
            sudo apt install -y docker.io
            sudo apt install docker-compose -y
            sudo systemctl start docker
            sudo systemctl enable docker
            sudo usermod -aG docker ubuntu
            exec su -l ubuntu
          else
            echo "Docker ya está instalado."
          fi

          # Asegurar que Docker esté activo
          if ! sudo systemctl is-active --quiet docker; then
            sudo systemctl start docker
          fi  

          # Navegar al directorio del proyecto
          cd /home/ubuntu/BusManagement

          # Descargar las imágenes más recientes
          sudo docker-compose pull

          # Detener y eliminar contenedores en ejecución
          sudo docker-compose down || true

          # Reconstruir y desplegar los servicios
          sudo docker-compose up --build -d

    - name: Cleanup private key file
      run: rm -f private_key.pem
