version: "3.8"

services:
  create-notifications:
    build:
      context: ./CreateNotifications
      dockerfile: Dockerfile
    image: "${DOCKER_USERNAME}/${DOCKER_REPOSITORY_NAME_NOTIFICATION_CREATE}:latest"
    restart: always
    ports:
      - "5000:5000"  # Puerto para el servicio create-notifications
    depends_on:
      - mongodb
    environment:
      - MONGODB_URI=mongodb://${MONGODB_USER}:${MONGODB_PASSWORD}@${MONGODB_HOST}:${MONGODB_PORT}/${MONGODB_DATABASE}

  delete-notifications:
    build:
      context: ./DeleteNotifications
      dockerfile: Dockerfile
    image: "${DOCKER_USERNAME}/${DOCKER_REPOSITORY_NAME_NOTIFICATION_DELETE}:latest"
    restart: always
    ports:
      - "5001:5001"  # Puerto para el servicio delete-notifications
    depends_on:
      - mongodb
    environment:
      - MONGODB_URI=mongodb://${MONGODB_USER}:${MONGODB_PASSWORD}@${MONGODB_HOST}:${MONGODB_PORT}/${MONGODB_DATABASE}

  view-notifications:
    build:
      context: ./ViewNotifications
      dockerfile: Dockerfile
    image: "${DOCKER_USERNAME}/${DOCKER_REPOSITORY_NAME_NOTIFICATION_VIEW}:latest"
    restart: always
    ports:
      - "5003:5003"  # Puerto para el servicio view-notifications
    depends_on:
      - mongodb
    environment:
      - MONGODB_URI=mongodb://${MONGODB_USER}:${MONGODB_PASSWORD}@${MONGODB_HOST}:${MONGODB_PORT}/${MONGODB_DATABASE}

  mongodb:
    image: mongo:latest
    restart: always
    environment:
      - MONGODB_USER=${MONGODB_USER}
      - MONGODB_PASSWORD=${MONGODB_PASSWORD}
      - MONGODB_DATABASE=${MONGODB_DATABASE}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data: